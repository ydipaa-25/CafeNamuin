<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Cash</title>
    <link rel="stylesheet" href="pageCash.css">
</head>

<body>

    <div class="container">

        <h3>PEMBAYARAN CASH</h3>

        <p class="judul">
            Pesanan Anda Telah Diterima
        </p>

        <p class="subjudul">
            Silakan lakukan pembayaran langsung di kasir
        </p>

        <p class="label">
            Total Pembayaran
        </p>

        <p class="total" id="totalCash">
            Rp 0
        </p>

        <p class="info">
            Tunjukkan nomor pesanan kepada kasir saat melakukan pembayaran
        </p>

        <a href="pageStatusPesanan.html" class="btn-status">
            CEK STATUS PESANAN
        </a>

    </div>

    <script>

const data = JSON.parse(localStorage.getItem("keranjang")) || [];

let subtotal = 0;

data.forEach(item => {
    subtotal += (Number(item.harga) || 0) * (Number(item.qty) || 0);
});

const tax = subtotal * 0.1;
const total = subtotal + tax;

document.getElementById("totalCash").textContent =
    "Rp " + total.toLocaleString("id-ID");

</script>

</body>
</html>
