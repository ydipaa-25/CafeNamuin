<!DOCTYPE html>
<html>
<head>
    <title>Status Pesanan</title>
    <link rel="stylesheet" href="pageStatusPesanan.css">
</head>

<body>

<div class="container">

    <div class="judul">
         STATUS PEMESANAN
    </div>

    <div class="label">
        Nomor Pesanan
    </div>

    <div class="value">
        #5213475
    </div>

    <div class="label">
        Nomor Meja
    </div>

    <div class="value">
        05
    </div>

    <div class="status-box">

        <div class="timeline">

            <div class="step done" id="step1">
                <div class="step-title">
                    Pesanan di Terima
                </div>

                <div class="step-desc">
                    10:13 • telah diterima oleh kitchen
                </div>
            </div>

            <div class="step active" id="step2">
                <div class="step-title">
                    Makanan Sedang Disiapkan
                </div>

                <div class="step-desc">
                    Chef sedang mempersiapkan makananmu
                </div>
            </div>

            <div class="step" id="step3">
                <div class="step-title">
                    Siap di Antar
                </div>

                <div class="step-desc">
                    Menunggu pelayan untuk mengantar
                </div>
            </div>

            <div class="step" id="step4">
                <div class="step-title">
                    Pesanan Sudah Siap
                </div>

                <div class="step-desc">
                    Selamat Menikmati!
                </div>
            </div>

        </div>

    </div>

    <a href="index.html" class="btn-selesai">
        SELESAI
    </a>

</div>

<script>

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");
const step4 = document.getElementById("step4");

// 10 detik
setTimeout(() => {

    step2.classList.remove("active");
    step2.classList.add("done");

    step3.classList.add("active");

}, 10000);

// 20 detik
setTimeout(() => {

    step3.classList.remove("active");
    step3.classList.add("done");

    step4.classList.add("active");

}, 20000);

// 30 detik
setTimeout(() => {

    step4.classList.remove("active");
    step4.classList.add("done");

    alert("Pesanan Anda Sudah Siap!");

}, 30000);

</script>

</body>
</html>
